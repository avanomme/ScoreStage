name: AureliaScore
options:
  bundleIdPrefix: com.aureliascore
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: FTBBTCJ34T

packages:
  CoreDomain:
    path: Packages/CoreDomain
  DesignSystem:
    path: Packages/DesignSystem
  LibraryFeature:
    path: Packages/LibraryFeature
  ReaderFeature:
    path: Packages/ReaderFeature
  AnnotationFeature:
    path: Packages/AnnotationFeature
  PlaybackFeature:
    path: Packages/PlaybackFeature
  NotationFeature:
    path: Packages/NotationFeature
  SyncFeature:
    path: Packages/SyncFeature
  DeviceLinkFeature:
    path: Packages/DeviceLinkFeature
  SetlistFeature:
    path: Packages/SetlistFeature
  InputTrackingFeature:
    path: Packages/InputTrackingFeature

targets:
  AureliaScore-iOS:
    type: application
    platform: iOS
    sources:
      - path: AureliaScore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aureliascore.app
        PRODUCT_NAME: Aurelia Score
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: AureliaScore/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: CoreDomain
      - package: DesignSystem
      - package: LibraryFeature
      - package: ReaderFeature
      - package: AnnotationFeature
      - package: PlaybackFeature
      - package: NotationFeature
      - package: SyncFeature
      - package: DeviceLinkFeature
      - package: SetlistFeature
      - package: InputTrackingFeature
    entitlements:
      path: AureliaScore/AureliaScore.entitlements
      properties:
        com.apple.security.app-sandbox: true

  AureliaScore-macOS:
    type: application
    platform: macOS
    sources:
      - path: AureliaScore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aureliascore.app
        PRODUCT_NAME: Aurelia Score
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: AureliaScore/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: CoreDomain
      - package: DesignSystem
      - package: LibraryFeature
      - package: ReaderFeature
      - package: AnnotationFeature
      - package: PlaybackFeature
      - package: NotationFeature
      - package: SyncFeature
      - package: DeviceLinkFeature
      - package: SetlistFeature
      - package: InputTrackingFeature
    entitlements:
      path: AureliaScore/AureliaScore.entitlements
      properties:
        com.apple.security.app-sandbox: true

  AureliaScoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: AureliaScore-iOS
      - package: CoreDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aureliascore.tests
